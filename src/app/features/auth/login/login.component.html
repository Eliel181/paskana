<section class="min-h-screen bg-[#FFFFFF] pt-20 flex items-center justify-center p-4 md:p-6 lg:p-12">
    <div
        class="bg-white rounded-3xl overflow-hidden shadow-2xl border border-cream/70 max-w-5xl w-full grid grid-cols-1 lg:grid-cols-12 min-h-[600px] card-shadow">

        <!-- Left Side: Cozy Image Panel (Hidden on mobile) -->
        <div class="hidden lg:flex lg:col-span-5 relative flex-col justify-between p-12 text-cream overflow-hidden">
            <!-- Background Image -->
            <div class="absolute inset-0 z-0">
                <img src="/bg-cafeteria.jpg" alt="Cafeteria" class="w-full h-full object-cover">
                <!-- Overlay Gradient -->
                <div class="absolute inset-0 bg-gradient-to-t from-moss via-earth/80 to-leaf/50 mix-blend-multiply">
                </div>
            </div>

            <!-- Content over Image -->
            <div class="relative z-10">
                <a class="font-display text-3xl font-bold tracking-wide text-white block">PASKANA</a>
                <span class="text-blossom font-bold text-xs uppercase tracking-widest mt-2 block">Tu rincón
                    especial</span>
            </div>

            <div class="relative z-10 space-y-4">
                <p class="font-display text-2xl leading-relaxed italic text-cream/90 text-shadow">
                    "El café es el bálsamo para el corazón y el espíritu."
                </p>
                <div class="w-12 h-1 bg-blossom rounded-full"></div>
            </div>
        </div>

        <!-- Right Side: Login Form -->
        <div class="lg:col-span-7 flex flex-col justify-center p-8 sm:p-12 md:p-16 bg-white relative">
            <!-- Subtle decor circles -->
            <div class="absolute -right-24 -top-24 w-64 h-64 bg-blossom/5 rounded-full blur-3xl pointer-events-none">
            </div>
            <div
                class="absolute -left-24 -bottom-24 w-64 h-64 bg-leaf-light/5 rounded-full blur-3xl pointer-events-none">
            </div>

            <div class="relative z-10 w-full max-w-md mx-auto space-y-8">
                <!-- Heading -->
                <div class="text-center lg:text-left space-y-2">
                    <h2 class="font-display text-3xl font-bold text-moss tracking-tight">Bienvenido de vuelta</h2>
                    <p class="text-text-dark/80 text-sm">Ingresa a tu cuenta para continuar con tu experiencia paskana.
                    </p>
                </div>

                <!-- Form -->
                <form class="space-y-5">
                    <!-- Email field -->
                    <div class="space-y-1.5">
                        <label for="email" class="text-xs font-bold uppercase tracking-wider text-text-dark/80">Correo
                            Electrónico</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-leaf-light">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.206" />
                                </svg>
                            </span>
                            <input type="email" id="email" placeholder="nombre@ejemplo.com"
                                class="w-full pl-12 pr-4 py-3 bg-cream border border-cream/90 hover:border-leaf-light/55 focus:border-leaf focus:bg-white text-text-dark rounded-2xl outline-none transition-all duration-300 shadow-sm text-sm">
                        </div>
                    </div>

                    <!-- Password field -->
                    <div class="space-y-1.5">
                        <div class="flex justify-between items-center">
                            <label for="password"
                                class="text-xs font-bold uppercase tracking-wider text-text-dark/80">Contraseña</label>
                            <a class="text-xs font-semibold text-leaf hover:text-moss hover:underline transition-all">¿La
                                olvidaste?</a>
                        </div>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-leaf-light">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                </svg>
                            </span>
                            <input type="password" id="password" placeholder="••••••••"
                                class="w-full pl-12 pr-4 py-3 bg-cream border border-cream/90 hover:border-leaf-light/55 focus:border-leaf focus:bg-white text-text-dark rounded-2xl outline-none transition-all duration-300 shadow-sm text-sm">
                        </div>
                    </div>

                    <!-- Remember Me checkbox -->
                    <div class="flex items-center justify-between py-1">
                        <label class="flex items-center gap-2 cursor-pointer select-none">
                            <input type="checkbox"
                                class="accent-leaf h-4 w-4 rounded border-cream text-leaf focus:ring-leaf">
                            <span class="text-sm text-text-dark/80 font-medium">Recordarme</span>
                        </label>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit"
                        class="w-full py-3.5 bg-gradient-to-r from-leaf to-earth hover:from-moss hover:to-leaf text-cream font-bold rounded-2xl shadow-lg hover:shadow-xl hover:shadow-leaf/10 transition-all duration-300 transform hover:scale-[1.01] cursor-pointer text-sm">
                        Iniciar Sesión
                    </button>
                </form>

                <!-- Divider -->
                <div class="relative flex items-center justify-center my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-cream"></div>
                    </div>
                    <span
                        class="relative px-4 bg-white text-xs text-text-dark/60 font-semibold uppercase tracking-wider">o
                        ingresar con</span>
                </div>

                <!-- Google SSO Button -->
                <button type="button"
                    class="w-full py-3.5 bg-white hover:bg-cream border border-cream/80 hover:border-leaf-light/30 text-text-dark font-bold rounded-2xl shadow-sm hover:shadow transition-all duration-300 flex items-center justify-center gap-3 cursor-pointer text-sm">
                    <svg class="h-5 w-5" viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
                        <g transform="matrix(1, 0, 0, 1, 0, 0)">
                            <path
                                d="M21.35,11.1H12v2.7h5.38c-0.24,1.28 -0.96,2.37 -2.04,3.1v2.56h3.28c1.92,-1.77 3.03,-4.38 3.03,-7.4C21.65,11.88 21.54,11.45 21.35,11.1z"
                                fill="#4285F4" />
                            <path
                                d="M12,20.58c2.43,0 4.47,-0.8 5.96,-2.18l-2.88,-2.24c-0.8,0.54 -1.82,0.86 -3.08,0.86 -2.37,0 -4.38,-1.6 -5.1,-3.75H3.5v2.33c1.48,2.94 4.53,4.94 8.08,4.94z"
                                fill="#34A853" />
                            <path
                                d="M6.9,13.27c-0.18,-0.54 -0.28,-1.11 -0.28,-1.7s0.1,-1.16 0.28,-1.7V7.54H3.5C2.9,8.73 2.56,10.08 2.56,11.5s0.34,2.77 0.94,3.96l2.9,-2.29c-0.18,-0.54 -0.28,-1.11 -0.28,-1.7z"
                                fill="#FBBC05" />
                            <path
                                d="M12,5.22c1.32,0 2.5,0.45 3.44,1.35l2.58,-2.58C16.47,2.51 14.43,1.72 12,1.72c-3.55,0 -6.6,2 -8.08,4.94l3.4,2.65c0.72,-2.15 2.73,-3.75 5.1,-3.75z"
                                fill="#EA4335" />
                        </g>
                    </svg>
                    Google
                </button>

                <!-- Footer Sign up link -->
                <div class="text-center text-sm">
                    <span class="text-text-dark/80">¿No tienes una cuenta? </span>
                    <a
                        class="font-bold text-leaf hover:text-moss hover:underline cursor-pointer transition-all">Regístrate</a>
                </div>
            </div>
        </div>
    </div>
</section>
