<!-- Navigation -->
<nav class="bg-white/90 backdrop-blur-sm fixed w-full z-50 border-b border-leaf/20 shadow-sm">
    <div class="max-w-7xl mx-auto px-6">
        <div class="flex justify-between items-center h-20">
            <a routerLink=""
                class="font-display text-2xl font-bold tracking-wide text-moss hover:opacity-90 transition-opacity">PASKANA</a>

            <div class="hidden md:flex space-x-8 items-center">
                <a routerLink="menu"
                    class="text-sm font-semibold text-text-dark hover:text-leaf transition-colors">Menu</a>

                <a href="#ubicacion" class="text-sm font-semibold text-text-dark hover:text-leaf transition-colors">Ubicación</a>
                <a routerLink="login"
                    class="px-5 py-2.5 bg-leaf text-cream rounded-full text-sm font-semibold hover:bg-moss transition-all hover:shadow-md">Ingresar</a>
            </div>

            <button (click)="toggleMobileMenu()" class="md:hidden p-2 text-text-dark hover:text-leaf transition-colors"
                aria-label="Toggle menu">
                @if (!isMobileMenuOpen) {
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                    <path fill-rule="evenodd"
                        d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z" />
                </svg>
                } @else {
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                    <path
                        d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z" />
                </svg>
                }
            </button>
        </div>
    </div>

    <!-- Mobile Menu -->
    @if (isMobileMenuOpen) {
    <div
        class="md:hidden bg-white/95 backdrop-blur-sm border-t border-leaf/10 shadow-lg px-6 py-6 transition-all duration-300">
        <div class="flex flex-col space-y-4">
            <a routerLink="menu" (click)="closeMobileMenu()"
                class="text-base font-semibold text-text-dark hover:text-leaf transition-colors py-2 border-b border-cream/50">Menu</a>
            <a href="#ubicacion" (click)="closeMobileMenu()"
                class="text-base font-semibold text-text-dark hover:text-leaf transition-colors py-2 border-b border-cream/50">Ubicación</a>
            <a routerLink="login" (click)="closeMobileMenu()"
                class="w-full text-center px-5 py-3 bg-leaf text-cream rounded-full text-base font-semibold hover:bg-moss transition-all hover:shadow-md mt-2">Ingresar</a>
        </div>
    </div>
    }
</nav>

<main>
    <router-outlet />
</main>
