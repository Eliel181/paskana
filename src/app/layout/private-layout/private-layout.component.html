<!-- Mobile Menu Overlay -->
<div (click)="closeSidebar()" [class.hidden]="!isSidebarOpen" [class.opacity-100]="isSidebarOpen"
    [class.opacity-0]="!isSidebarOpen"
    class="fixed inset-0 bg-moss/60 z-40 lg:hidden backdrop-blur-sm transition-opacity duration-300">
</div>

<!-- SideNavBar -->
<aside [class.translate-x-0]="isSidebarOpen" [class.-translate-x-full]="!isSidebarOpen"
    class="h-dvh w-64 fixed left-0 top-0 flex flex-col bg-gradient-to-b from-moss via-[#3E2B20] to-[#302118] border-r border-cream/10 shadow-xl z-50 transition-transform duration-300 lg:translate-x-0 overflow-hidden">
    <div class="flex flex-col h-full p-4">
        <!-- Brand Anchor -->
        <div class="flex items-center gap-3 px-2 py-6 mb-8 border-b border-cream/5">
            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-lg text-moss">
                <img src="/favicon.ico" alt="Paskana Logo" class="h-8 w-8 object-contain" />
            </div>
            <div>
                <h1 class="font-display text-2xl font-bold text-cream tracking-wide text-shadow">PASKANA</h1>
                <span
                    class="text-[9px] uppercase tracking-widest text-blossom font-bold bg-white/5 px-2 py-0.5 rounded-full mt-1.5 inline-block">Administración</span>
            </div>
        </div>
        <!-- Navigation Links -->
        <nav class="flex-1 space-y-1.5 sidebar-scroll overflow-y-auto pr-1">
            <!-- Dashboard (Active) -->
            <a class="flex items-center gap-3 px-4 py-3 text-cream bg-gradient-to-r from-leaf to-earth border-l-4 border-blossom rounded-r-xl shadow-md cursor-pointer transition-all duration-300 group pl-3"
                href="#">
                <!-- dashboard icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blossom" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                </svg>
                <span class="font-semibold tracking-wide text-sm">Dashboard</span>
            </a>
            <!-- Pedidos -->
            <a class="flex items-center gap-3 px-4 py-3 text-cream/75 hover:text-cream hover:bg-white/5 hover:pl-6 border-l-4 border-transparent hover:border-leaf-light/35 rounded-r-xl cursor-pointer transition-all duration-300 group"
                href="#">
                <!-- shopping_cart icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
                <span class="font-medium text-sm">Pedidos</span>
            </a>
            <!-- Inventario -->
            <a class="flex items-center gap-3 px-4 py-3 text-cream/75 hover:text-cream hover:bg-white/5 hover:pl-6 border-l-4 border-transparent hover:border-leaf-light/35 rounded-r-xl cursor-pointer transition-all duration-300 group"
                href="#">
                <!-- Inventario icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                </svg>
                <span class="font-medium text-sm">Inventario</span>
            </a>
            <!-- Personal -->
            <a class="flex items-center gap-3 px-4 py-3 text-cream/75 hover:text-cream hover:bg-white/5 hover:pl-6 border-l-4 border-transparent hover:border-leaf-light/35 rounded-r-xl cursor-pointer transition-all duration-300 group"
                href="#">
                <!-- Personal icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <span class="font-medium text-sm">Personal</span>
            </a>
            <!-- Reportes -->
            <a class="flex items-center gap-3 px-4 py-3 text-cream/75 hover:text-cream hover:bg-white/5 hover:pl-6 border-l-4 border-transparent hover:border-leaf-light/35 rounded-r-xl cursor-pointer transition-all duration-300 group"
                href="#">
                <!-- Reportes icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2h-2a2 2 0 00-2 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                </svg>
                <span class="font-medium text-sm">Reportes</span>
            </a>
            <!-- Settings -->
            <a class="flex items-center gap-3 px-4 py-3 text-cream/75 hover:text-cream hover:bg-white/5 hover:pl-6 border-l-4 border-transparent hover:border-leaf-light/35 rounded-r-xl cursor-pointer transition-all duration-300 group"
                href="#">
                <!-- settings icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <span class="font-medium text-sm">Ajustes</span>
            </a>
        </nav>
        <!-- CTA & User Profile -->
        <div class="mt-auto pt-6 border-t border-cream/10">
            <button
                class="w-full bg-gradient-to-r from-blossom to-leaf-light text-moss font-bold py-3.5 px-4 rounded-2xl flex items-center justify-center gap-2 mb-6 hover:from-leaf-light hover:to-blossom hover:scale-[1.02] active:scale-95 transition-all duration-300 shadow-lg shadow-blossom/10 cursor-pointer text-sm">
                <!-- add icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
                Nuevo Pedido
            </button>

        </div>
    </div>
</aside>

<!-- Main Content Shell -->
<main class="lg:pl-64 min-h-screen flex flex-col bg-[#FCFAF7] relative overflow-hidden">
    <!-- Background Decorative Blur Spheres -->
    <div class="absolute right-0 bottom-0 w-96 h-96 bg-blossom/5 rounded-full blur-3xl pointer-events-none -z-10"></div>
    <div class="absolute left-64 top-24 w-96 h-96 bg-leaf-light/5 rounded-full blur-3xl pointer-events-none -z-10">
    </div>

    <!-- TopNavBar -->
    <header
        class="flex justify-between items-center px-margin-mobile md:px-margin-desktop py-unit h-16 w-full bg-white/90 backdrop-blur-sm border-b border-cream/80 sticky top-0 z-30">
        <!-- Left: Toggle & Logo -->
        <div class="flex items-center gap-4">
            <button (click)="toggleSidebar()"
                class="lg:hidden p-2 text-moss hover:bg-cream/50 rounded-lg transition-all cursor-pointer"
                id="mobile-menu-toggle" aria-label="Toggle menu">
                <!-- menu icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
            <div class="font-display text-xl text-moss lg:hidden font-bold">PASKANA</div>
            <!-- Search Bar -->
            <div
                class="hidden ml-3 md:flex items-center bg-[#FCFAF7] rounded-full px-4 py-2 border border-cream/90 hover:border-leaf-light/40 focus-within:border-leaf/30 focus-within:bg-white transition-all duration-300 w-64 lg:w-96 shadow-inner">
                <!-- search icon -->
                <svg xmlns="http://www.w3.org/2000/svg"
                    class="h-5 w-5 text-leaf-light mr-2.5 transition-colors duration-300" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input
                    class="bg-transparent border-none focus:ring-0 text-body-sm w-full placeholder:text-text-dark/40 text-text-dark outline-none py-0.5"
                    placeholder="Search orders, beans, or staff..." type="text" />
            </div>
        </div>
        <!-- Right: Actions -->
        <div class="flex items-center gap-2 md:gap-4 text-text-dark/80 z-10">
            <button
                class="p-2 hover:text-moss hover:bg-cream/60 transition-all duration-300 rounded-xl relative cursor-pointer border border-transparent hover:border-cream/80"
                aria-label="Notifications">
                <!-- notifications icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                </svg>
                <span
                    class="absolute top-2 right-2 w-2.5 h-2.5 bg-gradient-to-r from-error to-red-400 rounded-full border-2 border-white animate-pulse"></span>
            </button>
            <div class="hidden sm:block h-8 w-[1px] bg-cream/80 mx-1"></div>
            <div
                class="flex items-center gap-3 bg-gradient-to-r from-cream/60 to-blossom/10 border border-leaf-light/20 rounded-2xl px-3 py-2 hover:border-leaf-light/40 hover:shadow-md cursor-pointer transition-all duration-300 group">
                <div class="relative">
                    <img alt="Coffee Break Admin Avatar"
                        class="w-9 h-9 rounded-full border-2 border-blossom/40 object-cover shadow-sm group-hover:border-leaf transition-colors duration-300"
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuCYuoF7UtQWry6mAVSyi_x48FghyDGVusO_Ylfiyg7_0OggAMvhipAfQPVoF19dx9cjjyhvxvb9qu4IKjIL7GOnQXblamijrWWUzzuR4CreukDLKrGGspHPKOttc6HXYaDtZLl9o0KedbtkH0JxtU3LJeCJRByB2sc423Ezr2eDIH1ppv1X8bXnLVp-pMv5ROcb24QrNNikP2mei2k0ToiTh40mkN9r9VUN5lYPf1axiIUKb-tFCzD_mdsyeHy64XJ07DBNAl33m4KL" />
                    <span
                        class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 rounded-full border-2 border-white shadow-sm"></span>
                </div>
                <div class="hidden sm:block flex-1 min-w-0">
                    <p class="font-bold truncate text-sm text-moss">Alex Roaster</p>
                    <p class="text-text-dark/50 text-[11px] truncate mt-0.5">Master Admin</p>
                </div>
                <!-- dropdown chevron -->
                <svg xmlns="http://www.w3.org/2000/svg"
                    class="hidden sm:block h-4 w-4 text-leaf-light group-hover:text-moss transition-colors duration-300"
                    fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                </svg>
            </div>
        </div>
    </header>

    <!-- Dynamic Page Canvas -->
    <div class="p-margin-mobile md:p-margin-desktop max-w-container-max mx-auto w-full space-y-gutter flex-grow z-10">
        <router-outlet></router-outlet>
    </div>
</main>
